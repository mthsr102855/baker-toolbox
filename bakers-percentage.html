<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📏 Baker’s Percentage Converter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        :root { --primary: #d97757; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#f8f1e9,#f4e6d8); margin:0; padding:20px; color:#3c2f2f; }
        .container { max-width:820px; margin:30px auto; background:white; border-radius:20px; box-shadow:0 25px 50px -12px rgb(0 0 0 /0.15); overflow:hidden; }
        header { background:linear-gradient(to right,#d97757,#c2410c); color:white; padding:40px 30px; text-align:center; }
        h1 { font-family:'Playfair Display',serif; font-size:2.6rem; margin:0; }
        .main-content { padding:40px 30px; }
        input { width:100%; padding:16px; border:2px solid #e5d5c0; border-radius:12px; font-size:1.1rem; margin-bottom:12px; }
        button { background:var(--primary); color:white; border:none; padding:16px; font-size:1.1rem; font-weight:600; border-radius:12px; width:100%; cursor:pointer; }
        .result { margin-top:20px; padding:20px; background:#fffaf0; border-radius:16px; font-size:1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>📏 Baker’s Percentage Converter</h1><p>Scale recipes instantly</p></header>
        <div class="main-content">
            <label>Flour weight (g) — always 100%</label>
            <input type="number" id="flour" value="500" oninput="calculate()">
            
            <label>Water %</label>
            <input type="number" id="waterPct" value="70" oninput="calculate()">
            
            <label>Salt %</label>
            <input type="number" id="saltPct" value="2" oninput="calculate()">
            
            <label>Starter / Levain %</label>
            <input type="number" id="starterPct" value="20" oninput="calculate()">
            
            <button onclick="calculate()">Calculate Weights</button>
            
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const flour = parseFloat(document.getElementById('flour').value) || 0;
            const water = parseFloat(document.getElementById('waterPct').value) || 0;
            const salt = parseFloat(document.getElementById('saltPct').value) || 0;
            const starter = parseFloat(document.getElementById('starterPct').value) || 0;
            
            let html = `<strong>For ${flour}g flour:</strong><br>`;
            html += `Water: ${Math.round(flour * water / 100)}g (${water}%)<br>`;
            html += `Salt: ${Math.round(flour * salt / 100)}g (${salt}%)<br>`;
            html += `Starter: ${Math.round(flour * starter / 100)}g (${starter}%)<br>`;
            html += `<small>Total dough weight ≈ ${Math.round(flour + flour*water/100 + flour*salt/100 + flour*starter/100)}g</small>`;
            
            document.getElementById('result').innerHTML = html;
        }
        window.onload = calculate;
    </script>
</body>
</html>
