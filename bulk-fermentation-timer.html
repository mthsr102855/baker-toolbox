<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⏱️ Bulk Fermentation Timer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        :root { --primary: #d97757; --accent: #8d5524; }
        body { font-family: 'Inter', system_ui, sans-serif; background: linear-gradient(135deg, #f8f1e9 0%, #f4e6d8 100%); margin:0; padding:20px; color:#3c2f2f; }
        .container { max-width:820px; margin:30px auto; background:white; border-radius:20px; box-shadow:0 25px 50px -12px rgb(0 0 0 / 0.15); overflow:hidden; }
        header { background:linear-gradient(to right, var(--primary), #c2410c); color:white; padding:40px 30px; text-align:center; }
        h1 { font-family:'Playfair Display', serif; font-size:2.6rem; margin:0 0 10px 0; }
        .main-content { padding:40px 30px; }
        .input-group { margin-bottom:24px; }
        label { display:block; font-weight:600; margin-bottom:8px; color:#4a3728; }
        input, select { width:100%; padding:16px; border:2px solid #e5d5c0; border-radius:12px; font-size:1.1rem; }
        button { background:var(--primary); color:white; border:none; padding:16px; font-size:1.1rem; font-weight:600; border-radius:12px; width:100%; margin-top:10px; cursor:pointer; }
        .timer-display { font-size:4rem; font-weight:700; text-align:center; color:var(--primary); margin:30px 0; }
        .result { background:#fffaf0; padding:25px; border-radius:16px; margin-top:20px; text-align:center; }
        .footer { text-align:center; padding:25px; color:#8d6f5c; font-size:0.95rem; border-top:1px solid #f0e6d8; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>⏱️ Bulk Fermentation Timer</h1><p>Estimate & time your bulk ferment</p><p><a href="menu.html">MENU</a></header>
        <div class="main-content">
            <div class="input-group">
                <label>Dough Temperature (°F)</label>
                <input type="number" id="temp" value="76" step="0.1" oninput="estimateTime()">
            </div>
            <div class="input-group">
                <label>Desired Dough Rise (%)</label>
                <select id="rise" onchange="estimateTime()">
                    <option value="50">50% (mild flavor)</option>
                    <option value="75" selected>75% (balanced)</option>
                    <option value="100">100% (strong flavor)</option>
                </select>
            </div>
            <button onclick="startTimer()">Start Timer</button>
            
            <div id="estimate" class="result" style="display:none;">
                <strong>Estimated Bulk Fermentation Time:</strong><br>
                <span id="estTime" style="font-size:2rem; color:var(--primary);"></span>
            </div>
            
            <div id="timerArea" style="display:none; text-align:center;">
                <div class="timer-display" id="countdown">00:00</div>
                <button onclick="stopTimer()">Stop Timer</button>
            </div>
        </div>
        <div class="footer">Tip: Warmer dough = faster fermentation. Aim for 74–78°F for best results.</div>
    </div>

    <script>
        let timerInterval;
        function estimateTime() {
            const temp = parseFloat(document.getElementById('temp').value) || 76;
            const rise = parseFloat(document.getElementById('rise').value);
            let hours = 0;
            if (temp >= 80) hours = rise / 30;
            else if (temp >= 75) hours = rise / 20;
            else if (temp >= 70) hours = rise / 15;
            else hours = rise / 10;
            const est = Math.round(hours * 10) / 10;
            document.getElementById('estTime').textContent = `${est} hours`;
            document.getElementById('estimate').style.display = 'block';
        }
        
        function startTimer() {
            estimateTime();
            document.getElementById('timerArea').style.display = 'block';
            let timeLeft = 60 * 60 * 3; // default 3 hours in seconds
            timerInterval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('countdown').textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); alert("Bulk fermentation complete!"); }
            }, 1000);
        }
        
        function stopTimer() { clearInterval(timerInterval); }
        window.onload = estimateTime;
    </script>
</body>
</html>
